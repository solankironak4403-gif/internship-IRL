<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL History</title>

  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f9fafb;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: #fff;
  border: 1px solid #ddd;
  padding: 20px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}

h1 {
  font-size: 22px;
}

.nav-link {
  font-size: 14px;
  color: #2563eb;
  text-decoration: none;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ddd;
  padding: 8px;
  font-size: 14px;
  text-align: left;
}

th {
  background: #f3f4f6;
}

.short-url {
  color: #047857;
  font-family: monospace;
}

.empty-state {
  text-align: center;
  padding: 40px 10px;
}

@media (max-width: 600px) {
  th, td {
    font-size: 12px;
  }
}

  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>URL History</h1>
      <a href="/" class="nav-link">← Back to Home</a>
    </div>

    {% if urls %}
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Original URL</th>
            <th>Short URL</th>
          </tr>
        </thead>
        <tbody>
          {% for url in urls %}
          <tr>
            <td>{{ url.long_url }}</td>
            <td class="short-url">{{ request.host_url }}{{ url.short_code }}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    {% else %}
    <div class="empty-state">
      <h2>No History Yet</h2>
      <p>Your shortened URLs will appear here once you create them.</p>
    </div>
    {% endif %}
  </div>
</body>
</html>
