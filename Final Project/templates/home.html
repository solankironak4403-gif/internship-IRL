<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>

  <style>
  * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f9fafb;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  max-width: 500px;
  width: 100%;
  background: #fff;
  border: 1px solid #ddd;
  padding: 20px;
}

.nav-link {
  display: inline-block;
  margin-bottom: 15px;
  font-size: 14px;
  color: #2563eb;
  text-decoration: none;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

h1 {
  font-size: 24px;
}

.subtitle {
  font-size: 14px;
  color: #555;
}

.input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

input[type="text"] {
  flex: 1;
  padding: 8px;
  border: 1px solid #ccc;
}

input[type="submit"],
button {
  padding: 8px 12px;
  background: #2563eb;
  color: #fff;
  border: none;
  cursor: pointer;
}

.error {
  background: #fee2e2;
  color: #b91c1c;
  padding: 8px;
  font-size: 14px;
  margin-bottom: 10px;
}

.result-section {
  margin-top: 15px;
}

.url-display {
  display: flex;
  gap: 8px;
}

#shortUrl {
  flex: 1;
  padding: 8px;
  border: 1px solid #ccc;
}

@media (max-width: 600px) {
  .input-group,
  .url-display {
    flex-direction: column;
  }

  input[type="submit"],
  button {
    width: 100%;
  }
}
  </style>
</head>

<body>
  <div class="container">
    <a href="/history" class="nav-link">→ View History</a>

    <div class="header">
      <h1>URL Shortener</h1>
      <p class="subtitle">Shorten your long URLs easily</p>
    </div>

    <form action="" method="POST">
      <div class="input-group">
        <input type="text" name="url" placeholder="Paste your long URL here..." required />
        <input type="submit" value="Shorten" />
      </div>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    {% if data %}
      <div class="result-section">
        <h2>Short URL</h2>
        <div class="url-display">
          <input type="text" id="shortUrl" value="{{ request.host_url }}{{ data }}" readonly />
          <button onclick="copyUrl()">Copy</button>
        </div>
      </div>
    {% endif %}
  </div>

  <script>
    function copyUrl() {
      const input = document.getElementById("shortUrl");
      input.select();
      navigator.clipboard.writeText(input.value);
      alert("Copied!");
    }
  </script>
</body>
</html>
